name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run compile
      - run: npm test
      - run: npx vsce package
      - uses: actions/upload-artifact@v4
        with:
          name: rdf-studio.vsix
          path: "*.vsix"
